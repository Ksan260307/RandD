<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADC - Semantic Gaussian Splatting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #0f172a; }
        input[type=range] { accent-color: #3b82f6; }
        input[type=checkbox] { accent-color: #10b981; width: 1.2rem; height: 1.2rem; cursor: pointer; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); }
        .crt-text { text-shadow: 0 0 5px rgba(74, 222, 128, 0.5); }
        .loader {
            border: 2px solid #1e293b;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex text-slate-200 font-sans">

    <!-- 知覚制御UI (Perception Layer) -->
    <div class="w-80 h-full flex flex-col glass border-r border-slate-700 z-10 shadow-2xl relative overflow-hidden flex-shrink-0">
        <div class="p-5 border-b border-slate-700 bg-slate-900/50">
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                ADC x Gemini
            </h1>
            <p class="text-[10px] text-slate-400 mt-1">Semantic Inference & Gaussian Avatars</p>
        </div>

        <div class="p-5 flex-1 overflow-y-auto space-y-5">
            
            <!-- エンティティ生成 -->
            <div class="space-y-2">
                <label class="text-xs font-semibold text-blue-400 tracking-wider uppercase">1. 観測対象の展開 (Semantic Input)</label>
                <div id="upload-box" class="border-2 border-dashed border-slate-600 rounded-lg p-4 text-center hover:border-blue-500 transition cursor-pointer relative bg-slate-800/50">
                    <input type="file" id="image-upload" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <span class="text-xs text-slate-300">画像をアップロードしてAI推論開始</span>
                </div>
            </div>

            <!-- AI 推論結果表示エリア -->
            <div id="ai-output" class="hidden space-y-2 p-3 bg-slate-900 rounded border border-slate-700">
                <label class="text-[10px] font-semibold text-yellow-400 tracking-wider uppercase">AI Semantic Analysis</label>
                <div id="ai-status" class="text-xs text-yellow-500"><span class="loader"></span>インターネット検索・推論中...</div>
                <div id="ai-result" class="hidden text-xs text-slate-300 space-y-1 font-mono">
                    <div class="text-emerald-400 font-bold mb-2 pb-1 border-b border-slate-700" id="ai-name">-</div>
                    <div class="grid grid-cols-2 gap-1 text-[10px]">
                        <div>Head: <span id="col-head" class="px-1 rounded">■</span></div>
                        <div>Body: <span id="col-body" class="px-1 rounded">■</span></div>
                        <div>Arms: <span id="col-arm" class="px-1 rounded">■</span></div>
                        <div>Legs: <span id="col-leg" class="px-1 rounded">■</span></div>
                    </div>
                </div>
            </div>

            <!-- 信号処理 (1€ Filter) -->
            <div class="space-y-3 pt-3 border-t border-slate-700">
                <label class="text-xs font-semibold text-emerald-400 tracking-wider uppercase">2. 信号平滑化 (1€ Filter)</label>
                <div class="flex items-center justify-between bg-slate-900 p-2 rounded border border-slate-700">
                    <span class="text-xs text-slate-300">Tracking Jitter (人工ノイズ)</span>
                    <input type="checkbox" id="jitter-toggle">
                </div>
                <div class="flex items-center justify-between bg-slate-900 p-2 rounded border border-emerald-900/50">
                    <span class="text-xs text-emerald-300 font-bold">1€ Filter 有効化</span>
                    <input type="checkbox" id="filter-toggle" checked>
                </div>
            </div>

            <!-- CVD 動態パラメータ -->
            <div class="space-y-4 pt-4 border-t border-slate-700">
                <label class="text-xs font-semibold text-blue-400 tracking-wider uppercase">3. 微視的動態 (CVD Parameters)</label>
                <div class="space-y-1">
                    <div class="flex justify-between text-xs"><span>リズム (Cycle Speed)</span><span id="speed-val">150</span></div>
                    <input type="range" id="speed-slider" min="0" max="500" value="150" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between text-xs"><span>エネルギー (Intensity)</span><span id="intensity-val">32768</span></div>
                    <input type="range" id="intensity-slider" min="0" max="65535" value="32768" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

        </div>
        <div class="p-4 bg-slate-900 border-t border-slate-700 text-xs flex justify-between">
            <span class="text-slate-500">State: <span id="state-label" class="text-blue-400 font-mono">Active</span></span>
            <select id="state-select" class="bg-transparent text-blue-400 font-mono outline-none cursor-pointer">
                <option value="1">稼働</option>
                <option value="5">停止</option>
            </select>
        </div>
    </div>

    <!-- 空間描画域 -->
    <div id="canvas-container" class="flex-1 relative bg-gradient-to-b from-slate-900 to-black">
        <div class="absolute top-4 right-4 bg-black/80 p-3 rounded border border-green-900/50 shadow-lg pointer-events-none z-10">
            <div class="text-[10px] text-green-600 font-bold mb-1 tracking-widest">ADC 64BIT SOA BUFFER</div>
            <div id="hex-display" class="font-mono text-green-400 text-sm crt-text">0x0000000000000000</div>
            <div class="text-[9px] text-slate-400 mt-2">Filter state: <span id="filter-status" class="text-emerald-400">ACTIVE</span></div>
        </div>
    </div>

    <script>
        // ==========================================
        // API Configuration (Gemini API)
        // ==========================================
        const apiKey = ""; 
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        // ==========================================
        // 0. One Euro Filter (1€フィルタ) 
        // ==========================================
        class LowPassFilter {
            constructor(alpha) { this.setAlpha(alpha); this.y = null; this.s = null; }
            setAlpha(alpha) { if (alpha <= 0.0 || alpha > 1.0) throw new Error("alpha error"); this.alpha = alpha; }
            filter(value) {
                let result = this.y === null ? value : this.alpha * value + (1.0 - this.alpha) * this.s;
                this.y = value; this.s = result;
                return result;
            }
            lastValue() { return this.y; }
        }

        class OneEuroFilter {
            constructor(freq, mincutoff = 1.0, beta = 0.0, dcutoff = 1.0) {
                this.freq = freq; this.mincutoff = mincutoff; this.beta = beta; this.dcutoff = dcutoff;
                this.xFilter = new LowPassFilter(this.alpha(this.mincutoff));
                this.dxFilter = new LowPassFilter(this.alpha(this.dcutoff));
                this.lastTime = null;
            }
            alpha(cutoff) { return 1.0 / (1.0 + (1.0 / (2 * Math.PI * cutoff)) / (1.0 / this.freq)); }
            filter(x, timestamp = null) {
                if (this.lastTime !== null && timestamp !== null) this.freq = 1.0 / (timestamp - this.lastTime);
                this.lastTime = timestamp;
                const prevX = this.xFilter.lastValue();
                const dx = prevX === null ? 0.0 : (x - prevX) * this.freq;
                const edx = this.dxFilter.filter(dx);
                const cutoff = this.mincutoff + this.beta * Math.abs(edx);
                this.xFilter.setAlpha(this.alpha(cutoff));
                return this.xFilter.filter(x);
            }
        }

        const filters = {
            spineZ: new OneEuroFilter(60, 1.0, 0.5), spineX: new OneEuroFilter(60, 1.0, 0.5),
            neckX: new OneEuroFilter(60, 1.0, 0.5), neckY: new OneEuroFilter(60, 1.0, 0.5),
            rootY: new OneEuroFilter(60, 1.0, 0.5)
        };

        // ==========================================
        // 1. ADC コア
        // ==========================================
        class AxiomCore {
            constructor() { this.phase = 0; this.intensity = 32768; this.lifecycle = 1; this.speed = 150; }
            get stateBigInt() {
                let s = 0n;
                s |= BigInt(Math.floor(this.phase) & 0xFFFF);
                s |= BigInt(Math.floor(this.intensity) & 0xFFFF) << 16n;
                s |= BigInt(Math.floor(this.lifecycle) & 0xF) << 48n;
                return s;
            }
            tick() {
                if (this.lifecycle === 5) return; 
                this.phase = (this.phase + this.speed) % 65536;
            }
        }
        const core = new AxiomCore();

        // ==========================================
        // 2. UI バインディング
        // ==========================================
        document.getElementById('speed-slider').addEventListener('input', (e) => { core.speed = parseInt(e.target.value); document.getElementById('speed-val').innerText = core.speed; });
        document.getElementById('intensity-slider').addEventListener('input', (e) => { core.intensity = parseInt(e.target.value); document.getElementById('intensity-val').innerText = core.intensity; });
        document.getElementById('state-select').addEventListener('change', (e) => { core.lifecycle = parseInt(e.target.value); });
        
        const jitterToggle = document.getElementById('jitter-toggle');
        const filterToggle = document.getElementById('filter-toggle');
        const filterStatus = document.getElementById('filter-status');
        
        filterToggle.addEventListener('change', (e) => {
            filterStatus.innerText = e.target.checked ? "ACTIVE" : "BYPASSED";
            filterStatus.className = e.target.checked ? "text-emerald-400" : "text-red-400";
        });

        // ==========================================
        // 3. Gemini API 連携 & 意味情報の抽出
        // ==========================================
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    console.warn(`API retry ${i+1}/${retries}...`);
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function analyzeImageWithGemini(base64Data, mimeType) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{
                    role: "user",
                    parts: [
                        { text: "この画像を分析し、Google検索を活用してキャラクター・人物・物体の名前と、特徴的な配色、プロポーションの比率を推論してください。未知のものや複雑な画像の場合は、見立てて結果を作成してください。指定されたJSON形式に必ず従ってください。" },
                        { inlineData: { mimeType: mimeType, data: base64Data } }
                    ]
                }],
                tools: [{ google_search: {} }], // Google検索グラウンディングを有効化
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            name: { type: "STRING", description: "推論されたキャラクター名や物体名" },
                            colors: {
                                type: "OBJECT",
                                properties: {
                                    head: { type: "STRING", description: "頭部のメインカラーのHEXコード (例: #FF0000)" },
                                    body: { type: "STRING", description: "胴体のメインカラーのHEXコード" },
                                    arm: { type: "STRING", description: "腕のメインカラーのHEXコード" },
                                    leg: { type: "STRING", description: "脚のメインカラーのHEXコード" }
                                }
                            },
                            proportions: {
                                type: "OBJECT",
                                properties: {
                                    headSize: { type: "NUMBER", description: "頭の大きさの比率 (標準は1.0)" },
                                    bodyHeight: { type: "NUMBER", description: "胴体の長さの比率 (標準は1.0)" },
                                    armLength: { type: "NUMBER", description: "腕の長さの比率 (標準は1.0)" },
                                    legLength: { type: "NUMBER", description: "脚の長さの比率 (標準は1.0)" }
                                }
                            }
                        },
                        required: ["name", "colors", "proportions"]
                    }
                }
            };

            const data = await fetchWithRetry(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        // ==========================================
        // 4. 描画エンジン (Three.js) & Procedural 3DGS表現
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0f172a, 0.05);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const gridHelper = new THREE.GridHelper(20, 40, 0x1e293b, 0x1e293b);
        gridHelper.position.y = -3;
        scene.add(gridHelper);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        let currentModel = null;
        let modelBones = {}; 
        let baseBoneY = -1.0; 

        // AIから抽出した「意味情報」に基づいて、3Dガウススプラットモデルをプロシージャル生成
        function buildProceduralSplatModel(semanticData) {
            if (currentModel) scene.remove(currentModel);
            currentModel = new THREE.Group();
            modelBones = {};

            const p = semanticData.proportions || { headSize: 1, bodyHeight: 1, armLength: 1, legLength: 1 };
            const c = semanticData.colors || { head: '#dddddd', body: '#aaaaaa', arm: '#aaaaaa', leg: '#888888' };
            
            const S_SIZE = 0.35; // スプラット（球）のベースサイズ
            const splats = [];
            const counts = { head: 0, spine: 0, lArm: 0, rArm: 0, lLeg: 0, rLeg: 0 };

            // 空間内にスプラット（点）をランダム配置するヘルパー
            function addSplats(part, colorHex, count, generatorFn) {
                const color = new THREE.Color(colorHex);
                // 自然な揺らぎを加えるためのHLS微調整
                const hsl = {}; color.getHSL(hsl);
                
                for(let i=0; i<count; i++) {
                    const pos = generatorFn();
                    const pointColor = new THREE.Color().setHSL(
                        hsl.h + (Math.random() - 0.5) * 0.05, 
                        hsl.s, 
                        Math.max(0.1, Math.min(1.0, hsl.l + (Math.random() - 0.5) * 0.2))
                    );
                    splats.push({ part, color: pointColor, lx: pos.x, ly: pos.y, lz: pos.z });
                    counts[part]++;
                }
            }

            // 頭部: 球体分布
            addSplats('head', c.head, 150, () => {
                const r = 1.2 * p.headSize * Math.cbrt(Math.random());
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2 * Math.random() - 1);
                return {
                    x: r * Math.sin(phi) * Math.cos(theta),
                    y: r * Math.sin(phi) * Math.sin(theta),
                    z: r * Math.cos(phi)
                };
            });

            // 胴体: 楕円柱分布
            addSplats('spine', c.body, 250, () => ({
                x: (Math.random() - 0.5) * 1.8,
                y: (Math.random() - 0.5) * 3.0 * p.bodyHeight,
                z: (Math.random() - 0.5) * 1.2
            }));

            // 腕: 円柱分布
            const armGen = () => ({
                x: (Math.random() - 0.5) * 0.8,
                y: (Math.random() - 0.5) * 2.5 * p.armLength,
                z: (Math.random() - 0.5) * 0.8
            });
            addSplats('lArm', c.arm, 80, armGen);
            addSplats('rArm', c.arm, 80, armGen);

            // 脚: 円柱分布
            const legGen = () => ({
                x: (Math.random() - 0.5) * 1.0,
                y: (Math.random() - 0.5) * 2.8 * p.legLength,
                z: (Math.random() - 0.5) * 1.0
            });
            addSplats('lLeg', c.leg, 100, legGen);
            addSplats('rLeg', c.leg, 100, legGen);

            // InstancedMeshで高速描画セットアップ
            const geometry = new THREE.SphereGeometry(S_SIZE, 12, 12);
            const material = new THREE.MeshPhysicalMaterial({ 
                roughness: 0.4, metalness: 0.2, transmission: 0.2,
                thickness: 0.5, transparent: true, opacity: 0.95
            });

            const meshes = {};
            const indices = { head: 0, spine: 0, lArm: 0, rArm: 0, lLeg: 0, rLeg: 0 };

            for (const key in counts) {
                if (counts[key] > 0) {
                    meshes[key] = new THREE.InstancedMesh(geometry, material, counts[key]);
                    meshes[key].instanceMatrix.setUsage(THREE.StaticDrawUsage);
                }
            }

            const dummy = new THREE.Object3D();
            for(const v of splats) {
                dummy.position.set(v.lx, v.ly, v.lz);
                dummy.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                const scale = 0.6 + Math.random() * 0.6;
                dummy.scale.set(scale, scale, scale);
                dummy.updateMatrix();
                
                const mesh = meshes[v.part];
                const idx = indices[v.part];
                mesh.setMatrixAt(idx, dummy.matrix);
                mesh.setColorAt(idx, v.color);
                indices[v.part]++;
            }

            for (const key in meshes) {
                meshes[key].instanceMatrix.needsUpdate = true;
                if (meshes[key].instanceColor) meshes[key].instanceColor.needsUpdate = true;
            }

            // ボーン階層構築 (プロポーションに応じた動的配置)
            const root = new THREE.Group();
            root.position.y = baseBoneY + (1.4 * p.legLength); 
            modelBones.root = root;

            const spine = new THREE.Group();
            spine.position.y = 1.0;
            root.add(spine);
            if(meshes.spine) spine.add(meshes.spine);
            modelBones.spine = spine;

            const head = new THREE.Group();
            head.position.y = (1.5 * p.bodyHeight) + (0.5 * p.headSize); 
            spine.add(head);
            if(meshes.head) head.add(meshes.head);
            modelBones.neck = head;

            const lArm = new THREE.Group();
            lArm.position.set(-1.2 - (0.2 * p.bodyHeight), 1.0 * p.bodyHeight, 0); 
            spine.add(lArm);
            if(meshes.lArm) {
                meshes.lArm.position.y = -1.0 * p.armLength; // ボーンを中心から肩へシフト
                lArm.add(meshes.lArm);
            }
            modelBones.lArm = lArm;

            const rArm = new THREE.Group();
            rArm.position.set(1.2 + (0.2 * p.bodyHeight), 1.0 * p.bodyHeight, 0); 
            spine.add(rArm);
            if(meshes.rArm) {
                meshes.rArm.position.y = -1.0 * p.armLength;
                rArm.add(meshes.rArm);
            }
            modelBones.rArm = rArm;

            const lLeg = new THREE.Group();
            lLeg.position.set(-0.6, -0.5, 0); 
            root.add(lLeg);
            if(meshes.lLeg) {
                meshes.lLeg.position.y = -1.0 * p.legLength;
                lLeg.add(meshes.lLeg);
            }
            modelBones.lLeg = lLeg;

            const rLeg = new THREE.Group();
            rLeg.position.set(0.6, -0.5, 0); 
            root.add(rLeg);
            if(meshes.rLeg) {
                meshes.rLeg.position.y = -1.0 * p.legLength;
                rLeg.add(meshes.rLeg);
            }
            modelBones.rLeg = rLeg;

            currentModel.add(root);
            scene.add(currentModel);
        }

        // デフォルトモデルの生成
        buildProceduralSplatModel({
            name: "ADC Default Instance",
            colors: { head: '#64748b', body: '#3b82f6', arm: '#3b82f6', leg: '#1e293b' },
            proportions: { headSize: 1.0, bodyHeight: 1.0, armLength: 1.0, legLength: 1.0 }
        });

        // ファイルアップロードハンドラ (AI推論フロー)
        document.getElementById('image-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            const aiOutput = document.getElementById('ai-output');
            const aiStatus = document.getElementById('ai-status');
            const aiResult = document.getElementById('ai-result');
            
            aiOutput.classList.remove('hidden');
            aiStatus.classList.remove('hidden');
            aiResult.classList.add('hidden');

            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const base64String = event.target.result.split(',')[1];
                    const mimeType = event.target.result.substring(event.target.result.indexOf(':') + 1, event.target.result.indexOf(';'));
                    
                    // Gemini APIで画像解析とGoogle検索を実行
                    const semanticData = await analyzeImageWithGemini(base64String, mimeType);
                    
                    // 推論結果をUIに反映
                    document.getElementById('ai-name').innerText = semanticData.name;
                    document.getElementById('col-head').style.color = semanticData.colors.head;
                    document.getElementById('col-body').style.color = semanticData.colors.body;
                    document.getElementById('col-arm').style.color = semanticData.colors.arm;
                    document.getElementById('col-leg').style.color = semanticData.colors.leg;
                    
                    aiStatus.classList.add('hidden');
                    aiResult.classList.remove('hidden');

                    // 抽出した意味データから3Dアバターをプロシージャル生成
                    buildProceduralSplatModel(semanticData);

                } catch (error) {
                    aiStatus.innerHTML = `<span class="text-red-500">推論に失敗しました。APIキーまたは環境を確認してください。</span>`;
                    console.error(error);
                }
            };
            reader.readAsDataURL(file);
        });

        // ==========================================
        // 5. メインループ (Tick)
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now() / 1000; 
            
            core.tick();
            document.getElementById('hex-display').innerText = core.getHexString();
            
            const angle = (core.phase / 65535.0) * Math.PI * 2;
            const intensityNorm = core.intensity / 65535.0;
            const activeIntensity = intensityNorm * (core.lifecycle === 5 ? 0 : 1);

            let targetRootY = baseBoneY + 2.5 + Math.sin(angle) * 0.15 * activeIntensity;
            let targetSpineZ = Math.sin(angle * 0.5) * 0.05 * activeIntensity;
            let targetSpineX = Math.sin(angle * 1.0) * 0.05 * activeIntensity;
            let targetNeckX = Math.sin(angle * 1.0 + Math.PI/4) * 0.1 * activeIntensity;
            let targetNeckY = Math.sin(angle * 0.3) * 0.1 * activeIntensity;

            // ジッターエフェクト
            if (document.getElementById('jitter-toggle').checked && core.lifecycle !== 5) {
                targetRootY += (Math.random() - 0.5) * 0.15;
                targetSpineZ += (Math.random() - 0.5) * 0.1;
                targetSpineX += (Math.random() - 0.5) * 0.1;
                targetNeckX += (Math.random() - 0.5) * 0.2;
                targetNeckY += (Math.random() - 0.5) * 0.2;
            }

            let finalRootY, finalSpineZ, finalSpineX, finalNeckX, finalNeckY;
            if (document.getElementById('filter-toggle').checked) {
                finalRootY = filters.rootY.filter(targetRootY, now);
                finalSpineZ = filters.spineZ.filter(targetSpineZ, now);
                finalSpineX = filters.spineX.filter(targetSpineX, now);
                finalNeckX = filters.neckX.filter(targetNeckX, now);
                finalNeckY = filters.neckY.filter(targetNeckY, now);
            } else {
                finalRootY = targetRootY; finalSpineZ = targetSpineZ; finalSpineX = targetSpineX;
                finalNeckX = targetNeckX; finalNeckY = targetNeckY;
                // 内部状態同期
                filters.rootY.filter(targetRootY, now); filters.spineZ.filter(targetSpineZ, now);
                filters.spineX.filter(targetSpineX, now); filters.neckX.filter(targetNeckX, now);
                filters.neckY.filter(targetNeckY, now);
            }

            if (currentModel && modelBones.root) {
                const b = modelBones;
                
                b.root.position.y = finalRootY;
                b.spine.rotation.z = finalSpineZ;
                b.spine.rotation.x = finalSpineX;
                b.neck.rotation.x = finalNeckX;
                b.neck.rotation.y = finalNeckY;
                
                b.lArm.rotation.x = Math.sin(angle * 1.0) * 0.15 * activeIntensity;
                b.lArm.rotation.z =  0.05 + Math.sin(angle * 0.5) * 0.05 * activeIntensity;
                b.rArm.rotation.x = Math.sin(angle * 1.0 + Math.PI) * 0.15 * activeIntensity; 
                b.rArm.rotation.z = -0.05 - Math.sin(angle * 0.5) * 0.05 * activeIntensity;

                b.lLeg.rotation.x = Math.sin(angle * 0.5) * 0.05 * activeIntensity;
                b.rLeg.rotation.x = Math.sin(angle * 0.5 + Math.PI) * 0.05 * activeIntensity;
                
                camera.lookAt(0, b.root.position.y + 1.5, 0);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        animate();
    </script>
</body>
</html>
